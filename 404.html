<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost at Sea | MerMommy Creations</title>
    <meta name="description" content="404 — Page not found. Looks like you drifted off course. Let's get you back to shore." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lost at Sea | MerMommy Creations" />
    <meta property="og:description" content="404 — Page not found. Looks like you drifted off course." />
    <meta property="og:image" content="https://mermommycreations.com/images/MerMommyCreations.png" />
    <meta property="og:url" content="https://mermommycreations.com/404" />
    <meta name="robots" content="noindex, follow" />

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Grand+Hotel&display=swap" rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg,
                    #d4c0e8 0%,
                    #c8b0dd 10%,
                    #b8a0d0 20%,
                    #a88bc0 30%,
                    #b0d0d0 45%,
                    #a0c8c8 55%,
                    #80c0c0 65%,
                    #70b8b8 75%,
                    #90d0d0 85%,
                    #b8e0e0 100%);
            color: #2d2a3a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .font-signature {
            font-family: 'Grand Hotel', cursive;
            font-weight: 400;
            letter-spacing: 1px;
            color: #5a3a6a;
        }

        .container {
            max-width: 600px;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.15);
            border: 4px solid rgba(45, 42, 58, 0.06);
            border-radius: 12px;
            backdrop-filter: blur(4px);
            position: relative;
            z-index: 10;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg,
                    transparent 0px, transparent 20px,
                    rgba(139, 108, 158, 0.02) 20px, rgba(139, 108, 158, 0.02) 21px);
            pointer-events: none;
            border-radius: 12px;
        }

        .error-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.7;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        h1 {
            font-size: 3.5rem;
            color: #5a3a6a;
            margin-bottom: 0.2rem;
            line-height: 1.1;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #3a3a4a;
            margin-bottom: 1rem;
            font-weight: 400;
        }

        p {
            font-size: 1rem;
            color: #3a3a4a;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            background: #69DBD3;
            color: #fff;
            font-weight: 600;
            padding: 0.7rem 2.5rem;
            font-size: 1rem;
            letter-spacing: 0.5px;
            border: 2px solid #2d2a3a;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s ease, border-color 0.2s ease;
            font-family: 'Fredoka', sans-serif;
            border-radius: 0;
        }

        .btn:hover {
            background: #8B6C9E;
            border-color: #8B6C9E;
        }

        .tiny-treasure {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #6a5a7a;
            opacity: 0.5;
        }

        .tiny-treasure .hidden-gem {
            display: inline-block;
            cursor: default;
            transition: transform 0.3s ease;
        }

        .tiny-treasure .hidden-gem:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .sky-decor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .bubble-el {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(200, 230, 240, 0.2), rgba(160, 200, 210, 0.05));
            border: 1px solid rgba(160, 200, 210, 0.1);
            bottom: -30px;
            pointer-events: none;
            box-shadow: inset 0 -4px 10px rgba(255, 255, 255, 0.1);
            will-change: transform;
        }

        .sparkle-el {
            position: absolute;
            bottom: -30px;
            pointer-events: none;
            font-size: 12px;
            opacity: 0.2;
            line-height: 1;
            color: #F5D442;
            text-shadow: 0 0 12px rgba(245, 212, 66, 0.1);
            will-change: transform;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
            .container { padding: 2rem 1.2rem; }
            .error-icon { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="sky-decor" id="decor-container"></div>

    <div class="container">
        <span class="error-icon">🧭</span>
        <h1 class="font-signature">Lost at Sea</h1>
        <p class="sub-title">404 — That page drifted off the map.</p>
        <p>
            Looks like the tide carried it away.<br>
            Don't worry — we'll get you back to shore.
        </p>
        <a href="/" class="btn">Return to Shore 🏖️</a>
        <div class="tiny-treasure">
            <span class="hidden-gem">🐚</span>
            <span class="hidden-gem" style="margin:0 0.2rem;">🪸</span>
            <span class="hidden-gem">⭐</span>
            <br>
            <span style="opacity:0.4;">Even mermaids take wrong turns sometimes.</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const decor = document.getElementById('decor-container');
            if(decor) {
                for(let i=0;i<15;i++) {
                    const el = document.createElement('div');
                    el.className = 'bubble-el';
                    const s = Math.random()*20+8;
                    el.style.width = s+'px';
                    el.style.height = s+'px';
                    el.style.left = Math.random()*100+'vw';
                    el.style.opacity = 0.15+Math.random()*0.2;
                    el.style.background = `radial-gradient(circle at 30% 30%, rgba(200,230,240,${0.15+Math.random()*0.15}), rgba(160,200,210,0.03))`;
                    decor.appendChild(el);

                    const duration = Math.random()*18+12;
                    const delay = Math.random()*15;
                    const xOffset = Math.random()*60-30;
                    el.animate([
                        { transform: 'translateY(0px) translateX(0px)', opacity: 0.15+Math.random()*0.2 },
                        { transform: `translateY(${window.innerHeight+150}px) translateX(${xOffset}px)`, opacity: 0 }
                    ], {
                        duration: duration * 1000,
                        delay: delay * 1000,
                        iterations: Infinity,
                        easing: 'linear'
                    });
                }

                for(let i=0;i<10;i++) {
                    const el = document.createElement('div');
                    el.className = 'sparkle-el';
                    el.textContent = '✦';
                    const s = Math.random()*10+10;
                    el.style.fontSize = s+'px';
                    el.style.opacity = 0.1+Math.random()*0.15;
                    el.style.left = Math.random()*100+'vw';
                    decor.appendChild(el);

                    const duration = Math.random()*20+14;
                    const delay = Math.random()*18;
                    const xOffset = Math.random()*70-35;
                    el.animate([
                        { transform: 'translateY(0px) translateX(0px)', opacity: 0.1+Math.random()*0.15 },
                        { transform: `translateY(${window.innerHeight+150}px) translateX(${xOffset}px)`, opacity: 0 }
                    ], {
                        duration: duration * 1000,
                        delay: delay * 1000,
                        iterations: Infinity,
                        easing: 'linear'
                    });
                }
            }
        });
    </script>
</body>
</html>
